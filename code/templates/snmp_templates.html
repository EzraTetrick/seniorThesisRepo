<!DOCTYPE html>
<link rel="stylesheet" href="/static/styles.css">
<html>
<head>
    <title>SNMP Templates</title>
</head>
<body>
    <h1><a href="/" class="title">VeNNM</a></h1><hr>
    <h2>Templates</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Version</th>
            </tr>
        </thead>
        <tbody>
        {% for snmp_template in snmp_templates %}
        <tr>
            <td>{{ snmp_template.template_name }}</td>
            <td>{{ snmp_template.description }}</td>
            <td>{{ snmp_template.version }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <hr>
    <h2>Create SNMP Templates</h2>

    <form action="/add_template" method="post">
        <label for="template_name">Template Name:</label><br>
        <input type="text" id="template_name" name="template_name" required placeholder="Name"><br><br>
        
        <label for="description">Template Description</label><br>
        <input type="text" id="description" name="description" placeholder="Description"><br><br>

        <input type="radio" id="v2c" name="version" value="v2c">
        <label for="v2c">v2c</label><br>

        <input type="radio" id="v3" name="version" value="v3">
        <label for="v3">v3</label><br><br>
        
        <!-- SNMPv2c section -->
        <div id="snmpv2c_fields" style="display:none;">
            <label>Community String</label><br>
            <input type="text" id="community" name="community" placeholder="Community String"><br><br>
        </div>

        <!-- SNMPv3 section -->
        <div id="snmpv3_fields" style="display:none;">
            <label for="username">Username</label><br>
            <input type="text" id="username" name="username" placeholder="Username"><br><br>

            <label for="auth_password">Auth Password</label><br>
            <input type="password" id="auth_password" name="auth_password" placeholder="Auth Password"><br><br>

            <label for="priv_password">Priv Password</label><br>
            <input type="password" id="priv_password" name="priv_password" placeholder="Priv Password"><br><br>
            
            <label>Auth Protocol</label><br>
            <label><input type="radio" name="auth_proto" value="none" checked> None</label><br>
            <label><input type="radio" name="auth_proto" value="md5"> MD5</label><br>
            <label><input type="radio" name="auth_proto" value="sha"> SHA</label><br>
            <label><input type="radio" name="auth_proto" value="sha256"> SHA-256</label><br><br>

            <label>Privacy Protocol</label><br>
            <label><input type="radio" name="priv_proto" value="none" checked> None</label><br>
            <label><input type="radio" name="priv_proto" value="aes128"> AES-128</label><br>
            <label><input type="radio" name="priv_proto" value="aes256"> AES-256</label><br>
            <label><input type="radio" name="priv_proto" value="des"> DES</label><br><br>
        </div>

        <input type="submit" value="Create Template">

        <script>
            const v2cRadio = document.getElementById("v2c");
            const v3Radio = document.getElementById("v3");

            const v2cFields = document.getElementById("snmpv2c_fields");
            const v3Fields = document.getElementById("snmpv3_fields");

            function updateFields() {
                if (v2cRadio.checked) {
                    v2cFields.style.display = "block";
                    v3Fields.style.display = "none";
                } 
                else {
                    v2cFields.style.display = "none";
                    v3Fields.style.display = "block";
                }
            }

            v2cRadio.addEventListener("change", updateFields);
            v3Radio.addEventListener("change", updateFields);
        </script>
    </form>
    <hr>

    <h2>Remove SNMP Templates</h2>
    <form action="/remove_snmp_template" method="post">

        <select id="template" name="template_id" required>
            <option value="" selected>None</option>
            {% for snmp_template in snmp_templates %}
            <option value="{{ snmp_template.template_id }}">{{ snmp_template.template_name }}</option>
            {% endfor %}
        </select>

    <input type="submit" value="Submit" onclick="return confirm('Are you sure you want to delete this template?')">
    </form>

</body>
</html>
