<!DOCTYPE html>
<link rel="stylesheet" href="/static/styles.css">
<html>
<head>
    <title>Devices</title>
</head>
<body>
    <h1><a href="/" class="title">VeNNM</a></h1>
    <h2>Devices</h2>
    <table border="1" cellpadding="5">
        <thead>
            <tr>
                <th>Hostname</th>
                <th>IP Address</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for device in devices %}
            <tr>
                <td>{{ device.hostname }}</td>
                <td>{{ device.ip_address }}</td>
                <td>{{ device.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
